<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> श्रीं गणपति </title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef1f5;
  margin: 0;
}
header {
  background: linear-gradient(90deg,#000,#333);
  color: #fff;
  text-align: center;
  padding: 20px;
  font-size: 26px;
  letter-spacing: 2px;
}
.container {
  padding: 15px;
}
.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 14px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}
h3 { margin-top: 0; }
button {
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  margin-top: 5px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
#billBox {
  background: #000;
  color: #00ff90;
  padding: 12px;
  border-radius: 8px;
  font-family: monospace;
  white-space: pre-line;
}
video { width: 100%; border-radius: 10px; }
.small-btn { background:#444; }
</style>
</head>

<body>
<header>NIKKI BOOK DEPOT</header>

<div class="container">

<div class="card">
<h3>Products</h3>
<p>Mandola - ₹350</p>
<p>Mini Mandola - ₹150</p>
</div>

<div class="card">
<h3>Create Smart Bill</h3>
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="location" placeholder="Customer Location">
<input type="text" id="address" placeholder="Full Delivery Address">
<select id="savedAddresses" onchange="selectSavedAddress()">
<option value="">Select Saved Address</option>
</select>
<button class="small-btn" onclick="saveAddress()">Save Address</button>
<button class="small-btn" onclick="getLocation()">Auto Detect Location</button>

<select id="product">
<option value="Mandola" data-price="350">Mandola - ₹350</option>
<option value="Mini Mandola" data-price="150">Mini Mandola - ₹150</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<button onclick="generateBill()">Generate Bill</button>
<div id="billBox"></div>
<button onclick="downloadBill()">Download Bill (PDF)</button>
</div>

<div class="card">
<h3>Barcode / QR Scanner</h3>
<div id="preview"></div>
<button onclick="startScanner()">Start Scanner</button>
<p id="scanResult"></p>
</div>

</div>

<script src="https://unpkg.com/html5-qrcode">function saveAddress() {
  let address = document.getElementById("address").value;
  if(!address) return alert("Enter address first");

  let list = JSON.parse(localStorage.getItem("addresses") || "[]");
  if(!list.includes(address)) list.push(address);
  localStorage.setItem("addresses", JSON.stringify(list));

  loadAddresses();
}

function loadAddresses() {
  let list = JSON.parse(localStorage.getItem("addresses") || "[]");
  let dropdown = document.getElementById("savedAddresses");
  dropdown.innerHTML = '<option value="">Select Saved Address</option>';
  list.forEach(addr => {
    let opt = document.createElement("option");
    opt.value = addr;
    opt.textContent = addr;
    dropdown.appendChild(opt);
  });
}

function selectSavedAddress() {
  let val = document.getElementById("savedAddresses").value;
  if(val) document.getElementById("address").value = val;
}

// Load saved addresses on start
window.onload = loadAddresses;
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
function generateBill() {
  let name = document.getElementById("name").value || "---";
  let location = document.getElementById("location").value || "---";
  let address = document.getElementById("address").value || "---";
  let productSelect = document.getElementById("product");
  let product = productSelect.value;
  let price = productSelect.options[productSelect.selectedIndex].dataset.price;
  let qty = document.getElementById("qty").value || 1;

  let total = price * qty;

  let billText = `\nNIKKI BOOK DEPOT\n---------------------\nName: ${name}\nLocation: ${location}
Address: ${address}\nProduct: ${product}\nPrice: ₹${price}\nQuantity: ${qty}\n---------------------\nTotal: ₹${total}`;

  document.getElementById("billBox").innerText = billText;
}

function downloadBill() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let text = document.getElementById("billBox").innerText;
  doc.text(text, 10, 10);
  doc.save("bill.pdf");
}

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      document.getElementById("location").value = `Lat:${lat.toFixed(4)}, Lon:${lon.toFixed(4)}`;

      // Reverse geocoding using OpenStreetMap
      try {
        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        let data = await res.json();
        document.getElementById("address").value = data.display_name;
      } catch (e) {
        document.getElementById("address").value = "Address not found";
      }
    });
  } else {
    alert("Location not supported");
  }
}, Lon:${lon}`;
    });
  } else {
    alert("Location not supported");
  }
}

function startScanner() {
  const scanner = new Html5Qrcode("preview");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qr => {
      document.getElementById("scanResult").innerText = "Scanned: " + qr;
      if(q.includes("150")) document.getElementById("product").selectedIndex = 1;
      if(q.includes("350")) document.getElementById("product").selectedIndex = 0;
      scanner.stop();
    }
  );
}
</script>
</body>
</html>
