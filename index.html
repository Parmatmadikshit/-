<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>श्री गणपति इंटरप्राइज</title>

<style>
body {margin:0;font-family:sans-serif;background:#fafafa;}
header {background:#d32f2f;color:white;padding:15px;text-align:center;font-size:20px;}
.container {padding:10px;}

.card {
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3 {margin:0;}
.price {color:#d32f2f;font-weight:bold;}

.qty {
  width:50px;
  padding:5px;
  text-align:center;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:#d32f2f;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  background:white;
  color:#d32f2f;
  border:none;
  padding:10px;
  border-radius:8px;
}

.qr {
  text-align:center;
  margin-top:20px;
}
</style>

<script>
const prices = {
 "Mandola":350,
 "Mini Mandola":150,
 "Tantasy":160,
 "Quantella":350,
 "Kresco Lolipop":400,
 "Tun Tun":500,
 "Fruit Drop":300,
 "Jungle World":300,
 "Benzo Gift Pack":200,
 "Imli":150
};

function updateTotal() {
 let total=0;
 for (let item in prices) {
   let qty=document.getElementById(item).value||0;
   total+=qty*prices[item];
 }
 document.getElementById("total").innerText="₹ "+total;
}

function orderNow(){
 let order="";
 let total=0;

 for (let item in prices) {
   let qty=document.getElementById(item).value;
   if(qty>0){
     order+=item+" x "+qty+"%0A";
     total+=qty*prices[item];
   }
 }

 let msg="Order:%0A"+order+"%0ATotal: ₹"+total;
 window.open("https://wa.me/919919286769?text="+msg);
}
</script>

</head>

<body>

<header>🍫 श्री गणपति इंटरप्राइज</header>

<div class="container">

<!-- PRODUCT CARDS -->
<div class="card">
<h3>Mandola <br><span class="price">₹350</span></h3>
<input type="number" id="Mandola" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Mini Mandola <br><span class="price">₹150</span></h3>
<input type="number" id="Mini Mandola" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Tantasy <br><span class="price">₹160</span></h3>
<input type="number" id="Tantasy" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Quantella <br><span class="price">₹350</span></h3>
<input type="number" id="Quantella" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Kresco Lolipop <br><span class="price">₹400</span></h3>
<input type="number" id="Kresco Lolipop" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Tun Tun <br><span class="price">₹500</span></h3>
<input type="number" id="Tun Tun" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Fruit Drop <br><span class="price">₹300</span></h3>
<input type="number" id="Fruit Drop" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Jungle World <br><span class="price">₹300</span></h3>
<input type="number" id="Jungle World" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Benzo Gift Pack <br><span class="price">₹200</span></h3>
<input type="number" id="Benzo Gift Pack" class="qty" min="0" onchange="updateTotal()">
</div>

<div class="card">
<h3>Imli <br><span class="price">₹150</span></h3>
<input type="number" id="Imli" class="qty" min="0" onchange="updateTotal()">
</div>

<!-- QR PAYMENT -->
<div class="qr">
<h3>Scan & Pay</h3>
<img src="qr.png" width="200">
</div>

</div>

<!-- CART BAR -->
<div class="cart">
<span id="total">₹ 0</span>
<button onclick="orderNow()">Order Now</button>
</div>

</body>
</html>
